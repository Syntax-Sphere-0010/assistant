name: my_flutter_app
description: A complete Flutter application.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0

  # State Management
  flutter_bloc: ^8.1.4
  equatable: ^2.0.5

  # Navigation
  go_router: ^13.2.0

  # Networking
  dio: ^5.4.0
  retrofit: ^4.1.0
  pretty_dio_logger: ^1.3.1

  # Local Storage
  shared_preferences: ^2.2.2
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.3.2

  # Utilities
  intl: ^0.19.0
  uuid: ^4.3.3
  logger: ^2.0.2+1
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  image_picker: ^1.0.7
  url_launcher: ^6.2.5
  package_info_plus: ^5.0.1

  # Wake Word / Speech Recognition
  speech_to_text: ^6.6.0

  # Forms & Validation
  formz: ^0.7.0

  # Firebase (optional - comment out if not using Firebase)
  # firebase_core: ^2.25.4
  # firebase_auth: ^4.17.4
  # cloud_firestore: ^4.15.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  retrofit_generator: ^8.1.0
  hive_generator: ^2.0.1
  json_annotation: ^4.8.1
  json_serializable: ^6.7.1
  mocktail: ^1.0.1
  bloc_test: ^9.1.6

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
